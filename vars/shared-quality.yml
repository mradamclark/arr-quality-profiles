---
# Shared quality profile configuration for Apple TV 4K (A1842) direct play optimization.
# Based on TRaSH Guides with custom scoring for direct play audio codecs.
# Applied to Sonarr and Radarr by tasks/arr-stack/arr-quality.yml.
#
# Service-specific formats, scores, allowed qualities, and size limits
# live in vars/arr-stack/sonarr.yml and vars/arr-stack/radarr.yml.

arr_quality_profile_name: "CustomProfile"

# ---------------------------------------------------------------------------
# Custom format definitions — shared between Sonarr and Radarr
# ---------------------------------------------------------------------------
arr_shared_custom_formats:
  # --- Audio (direct play priority) ---
  - name: "DD+ Atmos"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "DD+ Atmos"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields: [{name: value, value: '\b(ddp|dd\+|eac3).?atmos\b'}]

  - name: "DD+"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "DD+"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        # No trailing \b — matches DDP2.0, DDP5.1, EAC3, etc.
        fields: [{name: value, value: '\b(ddp|dd\+|eac3)'}]
      - name: "Not Atmos"
        implementation: ReleaseTitleSpecification
        negate: true
        required: true
        fields: [{name: value, value: '\batmos\b'}]

  - name: "DD (AC3)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "DD"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields: [{name: value, value: '\b(dd|ac3)\b'}]
      - name: "Not DD+"
        implementation: ReleaseTitleSpecification
        negate: true
        required: true
        # No trailing \b — must exclude DDP2.0, DDP5.1, etc. same as DD+ match
        fields: [{name: value, value: '\b(ddp|dd\+|eac3)'}]

  - name: "AAC"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "AAC"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\bAAC\b'}]

  - name: "DTS (Transcode)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "DTS"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(dts|dts.?hd|dts.?ma|dts.?x)\b'}]

  # --- Video (HDR/DV direct play on ATV4K) ---
  - name: "Dolby Vision"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "DV"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(dv|dovi|dolby.?vision)\b'}]

  - name: "HDR10"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "HDR10"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\bhdr10\b'}]

  # --- Source/Codec preferences ---
  - name: "WEBDL"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "WEBDL"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\bweb.?dl\b'}]

  - name: "x265/HEVC"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "x265"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(x265|h\.?265|hevc)\b'}]

  - name: "Proper/Repack"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Repack"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(proper|repack)\b'}]

  - name: "Multi/Dual Audio"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Multi"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(multi|dual.?audio)\b'}]

  # --- Unwanted (blocked) ---
  - name: "BR-DISK"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "BR-DISK"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(br.?disk|bdmv|bdremux)\b'}]

  - name: "AV1"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "AV1"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\bav1\b'}]

  - name: "x265 (HD)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "x265"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields: [{name: value, value: '\b(x265|h\.?265|hevc)\b'}]
      - name: "720p"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields: [{name: value, value: '\b720p\b'}]

  - name: "Hardcoded Subs"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "HC"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(hc|hardcoded|hard.?sub)\b'}]

  - name: "Described Audio (AD)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "DVS/AD"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(dvs|descriptive.?audio|audio.?description)\b'}]

  - name: "3D"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "3D"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b3d\b'}]

  - name: "LQ (Low Quality)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "LQ"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(yify|yts|rarbg|eztv|tgx)\b'}]

  - name: "Password Required"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Password"
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields: [{name: value, value: '\b(password|passwort|pass)\b|\{.{0,20}\}|\[password\]'}]

# ---------------------------------------------------------------------------
# Custom format scores — shared between Sonarr and Radarr
#
# Scores are tiebreakers WITHIN a quality tier (e.g. two WEB-1080p releases).
# Quality tier ordering (HDTV-720p < HDTV-1080p < WEB 720p < WEB 1080p)
# is handled by the quality profile and takes precedence over these scores.
#
# maxSize in quality definitions handles oversized downloads — if the only
# WEB-720p available exceeds the size limit, Sonarr falls back to lower tiers.
#
# Within-tier score examples:
#   WEB-1080p, DD+, 800MB  → 10+20+25+20 = 75
#   WEB-1080p, DD (AC3), 700MB → 10+20+20+15 = 65  (same tier, clearly worse)
#   WEB-720p,  DD+, 600MB  → 10+ 0+25+20 = 55  (lower tier, score reflects it)
# ---------------------------------------------------------------------------
arr_shared_format_scores:
  # Source: small bonus to prefer WEB-DL over WEBRip within the same quality group
  "WEBDL": 10
  # Video codec: penalize x265/HEVC to prefer H.264 within the same quality tier.
  # Apple TV 4K can hardware decode HEVC, but community x265 encodes are often
  # 10-bit which the Plex app transcodes rather than direct plays. H.264 WEB-DL
  # content almost always direct plays without transcoding. x265 is still
  # downloaded as a fallback when no H.264 release exists.
  "x265/HEVC": -50
  # HDR/DV — nice bonus on ATV4K
  "Dolby Vision": 20
  "HDR10": 10
  # Audio (direct play priority on ATV4K)
  "DD+ Atmos": 30
  "DD+": 25
  "DD (AC3)": 20
  "AAC": 15
  # Misc
  "Proper/Repack": 5
  # Negatives
  "Multi/Dual Audio": -100
  "DTS (Transcode)": -200  # Requires Plex transcode on ATV4K
  # Blocklisted (never download)
  "LQ (Low Quality)": -10000
  "3D": -10000
  "Hardcoded Subs": -10000
  "Described Audio (AD)": -10000
  "x265 (HD)": -10000
  "AV1": -10000
  "Password Required": -10000
  "BR-DISK": -10000
