# Sweet spot: 500MB-1GB for 720p, ~2GB ideal for 1080p WEB-DL hour-long episode.
# Gentle negative slope above 2GB — smaller files win ties within a tier.
# maxSize in quality definitions enforces the hard ceiling.
arr_extra_scores:
  "CAM/TS": -10000
  "Size: <500MB": 10            # Small but watchable
  "Size: 500-600MB": 20         # Sweet spot starts
  "Size: 600-700MB": 20
  "Size: 700-800MB": 20
  "Size: 800-900MB": 20
  "Size: 900MB-1GB": 20
  "Size: 1-1.1GB": 15           # Still good
  "Size: 1.1-1.2GB": 15
  "Size: 1.2-1.3GB": 15
  "Size: 1.3-1.4GB": 10
  "Size: 1.4-1.5GB": 10
  "Size: 1.5-1.6GB": 5
  "Size: 1.6-1.7GB": 5
  "Size: 1.7-1.8GB": 3
  "Size: 1.8-1.9GB": 2
  "Size: 1.9-2GB": 1
  "Size: 2-2.1GB": 0            # Baseline — ideal for 1080p WEB-DL
  "Size: 2.1-2.2GB": -3
  "Size: 2.2-2.3GB": -5
  "Size: 2.3-2.4GB": -7
  "Size: 2.4-2.5GB": -8
  "Size: 2.5-3GB": -10          # Getting large for an hour-long episode
  "Size: 3-4GB": -15
  "Size: 4-6GB": -30            # Too large for 1080p TV
  "Size: >6GB": -60             # Way too large

arr_sizes:
  HDTV-720p:    {max: 34, preferred: 30}
  HDTV-1080p:   {max: 46, preferred: 40}
  WEBRip-720p:  {max: 34, preferred: 30}
  WEBDL-720p:   {max: 34, preferred: 30}
  WEBRip-1080p: {max: 68, preferred: 55}
  WEBDL-1080p:  {max: 68, preferred: 55}
