---
# Sonarr-specific configuration — loaded by tasks/arr-quality.yml at runtime.

arr_service_label: Sonarr
arr_url: "{{ sonarr_url }}"
arr_api_key: "{{ sonarr_api_key }}"
arr_content_type: series
arr_cutoff_quality: "WEB 1080p"

# SABnzbd download client priority: recent episodes at normal, backlog at low.
# Normal = 0, Low = -1 (SABnzbd priority values as used by Sonarr)
arr_download_client_recent_field: recentTvPriority
arr_download_client_older_field: olderTvPriority
arr_download_client_recent_priority: 0   # Normal
arr_download_client_older_priority: -1   # Low

arr_custom_filters: []

arr_allowed:
  - SDTV
  - "WEB 480p"
  - HDTV-720p
  - HDTV-1080p
  - "WEB 720p"
  - "WEB 1080p"

arr_extra_formats:
  - name: "CAM/TS"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "CAM or Telesync"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields: [{name: value, value: '(?i)\b(CAM|HDCAM|TELESYNC|HDTS|\bTS\b|TELECINE|WORKPRINT|SCR|SCREENER)\b'}]

  - name: "Size: <500MB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 0.0}, {name: max, value: 0.5}]

  - name: "Size: 500-600MB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 0.5}, {name: max, value: 0.6}]

  - name: "Size: 600-700MB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 0.6}, {name: max, value: 0.7}]

  - name: "Size: 700-800MB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 0.7}, {name: max, value: 0.8}]

  - name: "Size: 800-900MB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 0.8}, {name: max, value: 0.9}]

  - name: "Size: 900MB-1GB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 0.9}, {name: max, value: 1.0}]

  - name: "Size: 1-1.1GB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 1.0}, {name: max, value: 1.1}]

  - name: "Size: 1.1-1.2GB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 1.1}, {name: max, value: 1.2}]

  - name: "Size: 1.2-1.3GB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 1.2}, {name: max, value: 1.3}]

  - name: "Size: 1.3-1.4GB"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: size
        implementation: SizeSpecification
        negate: false
        required: true
        fields: [{name: min, value: 1.3}, {name: max, value: 1.4}]

  - name: "Size: 1.4-1.5GB"
